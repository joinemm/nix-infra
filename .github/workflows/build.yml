name: nix build

on:
  push:
    branches:
      - master

jobs:
  # define-matrix:
  #   runs-on: ubuntu-latest
  #   outputs:
  #     matrix: ${{ steps.eval-matrix.outputs.matrix }}
  #
  #   steps:
  #     - uses: actions/checkout@v6
  #
  #     - uses: DeterminateSystems/determinate-nix-action@v3 
  #
  #     - id: eval-matrix
  #       name: Generate Nix Matrix
  #       run: |
  #         set -Eeu
  #         matrix="$(nix eval --accept-flake-config --json '.#githubActions.matrix')"
  #         echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    # needs: define-matrix
    # strategy:
    #   fail-fast: false
    #   matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    # concurrency:
    #   group: ${{ github.workflow }}.${{ github.event.pull_request.number || github.ref }}.${{ matrix.host }}
    #   cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6
      - uses: wimpysworld/nothing-but-nix@v10
        with:
          hatchet-protocol: 'holster'

      - uses: DeterminateSystems/determinate-nix-action@v3 
        with:
          extra-conf: |
            max-jobs = auto
            max-substitution-jobs = 64
            http-connections = 64

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: 
            ${{ secrets.BUILDER_SSH_KEY }}

      - name: Build ${{ matrix.host }}
        run: |
          sudo sh -c "echo 'builder.vedenemo.dev ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIG68NdmOw3mhiBZwDv81dXitePoc1w//p/LpsHHA8QRp' >>/etc/ssh/ssh_known_hosts"
          nix run github:Mic92/nix-fast-build -- --remote jrautiola@builder.vedenemo.dev --no-download --no-nom --skip-cached --option accept-flake-config true --flake .#ci-targets
